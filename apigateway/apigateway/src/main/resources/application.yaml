server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: servicio-libros
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/libros,/api/v1/libros/**

            - id: servicio-libros-v2
              uri: http://localhost:8081
              predicates:
                - Path=/api/v2/libros,/api/v2/libros/**

            - id: servicio-prestamos
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/prestamos,/api/v1/prestamos/**

            - id: servicio-prestamos-v2
              uri: http://localhost:8082
              predicates:
                - Path=/api/v2/prestamos,/api/v2/prestamos/**

            - id: servicio-usuarios
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/usuarios,/api/v1/usuarios/**

            - id: servicio-usuarios-v2
              uri: http://localhost:8083
              predicates:
                - Path=/api/v2/usuarios,/api/v2/usuarios/**

            - id: servicio-auth
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/auth,/api/v1/auth/**

            - id: servicio-admin
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/admin,/api/v1/admin/**